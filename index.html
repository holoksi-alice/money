<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Pitch & Modulation 動作聲音教學</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="app">
    <header>
      <h1>動作控制聲音：Pitch 與 Modulation</h1>
      <p class="subtitle">右手高度控制音高，左手左右擺動控制 modulation。適合中學音樂課堂。</p>
      <p class="privacy">本活動只會使用相機作即時動作偵測，不會儲存或上載任何影像。</p>
    </header>

    <section class="layout">
      <div class="camera-panel card">
        <h2>相機畫面</h2>
        <div class="video-wrap">
          <video id="video" autoplay playsinline muted></video>
          <canvas id="overlay"></canvas>
        </div>
        <p id="cameraStatus" class="status">請先按「Start Camera」。</p>
      </div>

      <div class="control-panel card">
        <h2>聲音控制顯示</h2>
        <div class="meter-block">
          <label>Pitch: <span id="pitchValue">440 Hz</span></label>
          <progress id="pitchBar" max="100" value="30"></progress>
        </div>
        <div class="meter-block">
          <label>Mod Speed: <span id="modSpeedValue">0.0 Hz</span></label>
          <progress id="modSpeedBar" max="100" value="0"></progress>
        </div>
        <div class="meter-block">
          <label>Mod Depth: <span id="modDepthValue">0 cents</span></label>
          <progress id="modDepthBar" max="100" value="0"></progress>
        </div>
        <p class="hint">提示：舉高手，聲音會變高；左手左右擺動越快，聲音顫動越明顯。</p>
      </div>
    </section>

    <section class="card buttons">
      <button id="startCamera">Start Camera</button>
      <button id="startSound">Start Sound</button>
      <button id="stopSound">Stop Sound</button>
      <button id="reset">Reset</button>
      <label>
        Change Sound
        <select id="soundType">
          <option value="sine">Sine Wave</option>
          <option value="square">Square Wave</option>
          <option value="sawtooth">Sawtooth Wave</option>
          <option value="robot">Robot Sound</option>
          <option value="space">Space Sound</option>
        </select>
      </label>
    </section>

    <section class="card tips">
      <h2>教學提示</h2>
      <ul>
        <li>請站在鏡頭前，讓雙手都進入畫面。</li>
        <li>右手越高，Pitch 越高。</li>
        <li>左手左右擺動越快，Modulation 越快、越深。</li>
      </ul>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.14"></script>
  <script src="app.js"></script>
</body>
</html>
